<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Neon Auto Showroom</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background: linear-gradient(135deg,#0a0a1a,#1a1a40,#0a0a1a);
color:white;
overflow-x:hidden;
}

/* glowing blobs */
.blob{
position:absolute;
width:300px;
height:300px;
border-radius:50%;
filter: blur(80px);
opacity:0.5;
animation: float 8s infinite ease-in-out;
}

.b1{background:#00f0ff;top:10%;left:10%;}
.b2{background:#ff00ff;bottom:10%;right:10%;animation-delay:2s;}
.b3{background:#00ff88;top:50%;left:50%;animation-delay:4s;}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-40px)}
}

/* glass */
.glass{
background: rgba(255,255,255,0.08);
backdrop-filter: blur(20px);
border:1px solid rgba(255,255,255,0.15);
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

nav{
display:flex;
justify-content:space-between;
padding:20px 10%;
align-items:center;
position:relative;
z-index:2;
}

.logo{
font-size:22px;
font-weight:bold;
color:#00f0ff;
}

.btn{
padding:10px 18px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00f0ff,#ff00ff);
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.btn:hover{transform:scale(1.05);}

.hero{
text-align:center;
padding:80px 20px;
position:relative;
z-index:2;
}

.hero h1{
font-size:50px;
}

.hero p{
opacity:0.7;
margin-top:10px;
}

.hero img{
width:350px;
margin-top:20px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* cars */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:60px 10%;
position:relative;
z-index:2;
}

.card{
padding:20px;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
border-radius:15px;
margin-bottom:10px;
}

/* form */
.form{
padding:60px 10%;
position:relative;
z-index:2;
}

.box{
max-width:500px;
margin:auto;
padding:30px;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
outline:none;
}

textarea{height:100px;}

/* footer */
footer{
text-align:center;
padding:20px;
opacity:0.6;
}

</style>
</head>

<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<nav>
<div class="logo">NEON AUTO 🚗</div>
<button class="btn">Contact</button>
</nav>

<section class="hero">
<h1>Premium Car Showroom</h1>
<p>Buy luxury & sports cars with futuristic experience</p>

<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=800&q=80"/>
</section>

<section class="grid">

<div class="glass card">
<img src="https://images.unsplash.com/photo-1619767886558-
