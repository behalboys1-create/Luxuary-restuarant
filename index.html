  <!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Veloura — 3D Luxury Dining</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI}

body{
height:300vh;
background:#000;
overflow-x:hidden;
color:#fff;
}

/* ===== 3D SCENE ===== */
.scene{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
perspective:1400px;
overflow:hidden;
}

/* ===== BACKGROUND GLOW ===== */
.bg-glow{
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,#7c3aed,transparent 60%);
filter:blur(80px);
opacity:0.6;
top:20%;
left:50%;
transform:translate(-50%,-50%);
}

.bg-glow2{
position:absolute;
width:400px;
height:400px;
background:radial-gradient(circle,#06b6d4,transparent 60%);
filter:blur(90px);
opacity:0.5;
top:70%;
left:20%;
}

/* ===== FLOAT LAYERS ===== */
.layer{
position:absolute;
left:50%;
top:50%;
transform-style:preserve-3d;
will-change:transform;
transition:transform 0.2s ease-out;
}

/* HERO CARD */
.hero{
width:420px;
height:240px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.2);
box-shadow:0 0 60px rgba(124,58,237,0.3);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
transform:translate(-50%,-50%) translateZ(0px);
}

.hero h1{
font-size:42px;
background:linear-gradient(90deg,#fff,#a855f7,#06b6d4);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
margin-top:10px;
opacity:0.7;
max-width:300px;
}

/* FLOATING CARDS */
.card{
position:absolute;
width:180px;
height:120px;
border-radius:18px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.15);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-size:14px;
}

.c1{transform:translate(-300px,-120px) translateZ(-200px);}
.c2{transform:translate(260px,-180px) translateZ(-300px);}
.c3{transform:translate(-260px,160px) translateZ(-400px);}
.c4{transform:translate(300px,120px) translateZ(-250px);}

/* SECTION TEXT */
.scroll-section{
position:relative;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.section-text{
font-size:60px;
font-weight:600;
background:linear-gradient(90deg,#fff,#7c3aed,#06b6d4);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
opacity:0;
transform:translateY(50px);
}

</style></head>
<body><div class="scene">  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>  <div class="layer hero" id="hero">
    <h1>Veloura Dining</h1>
    <p>Apple-level luxury floating restaurant experience with 3D immersive design</p>
  </div>  <div class="layer card c1">Fine Dining</div>
  <div class="layer card c2">Luxury Chefs</div>
  <div class="layer card c3">Premium Taste</div>
  <div class="layer card c4">5★ Experience</div></div><!-- SCROLL SECTIONS --><div class="scroll-section"><div class="section-text">Crafted Like Apple</div></div>
<div class="scroll-section"><div class="section-text">Designed in 3D Space</div></div>
<div class="scroll-section"><div class="section-text">Luxury Redefined</div></div><script>
const hero = document.getElementById("hero");
const text = document.querySelectorAll(".section-text");

window.addEventListener("scroll", () => {
  let y = window.scrollY;

  /* HERO FLOAT */
  hero.style.transform =
    `translate(-50%,-50%) translateZ(${y * 0.3}px) scale(${1 + y*0.0005})`;

  /* FLOAT CARDS DEPTH */
  document.querySelector(".c1").style.transform =
    `translate(-300px,-120px) translateZ(${y * 0.2}px)`;

  document.querySelector(".c2").style.transform =
    `translate(260px,-180px) translateZ(${y * 0.25}px)`;

  document.querySelector(".c3").style.transform =
    `translate(-260px,160px) translateZ(${y * 0.3}px)`;

  document.querySelector(".c4").style.transform =
    `translate(300px,120px) translateZ(${y * 0.35}px)`;

  /* TEXT FADE IN */
  text.forEach((el,i)=>{
    let rect = el.getBoundingClientRect().top;
    if(rect < window.innerHeight * 0.8){
      el.style.opacity = 1;
      el.style.transform = "translateY(0)";
      el.style.transition = "0.8s ease";
    }
  });
});
</script></body>
  </html>
